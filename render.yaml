services:
  - type: web
    name: aute-mod-pro-v2
    runtime: python3
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: OWNER_ID
        sync: false
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: PYTHONUNBUFFERED
        value: "1"
    disk:
      name: bot-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    healthCheckPath: /login
